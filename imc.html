<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cálculo de IMC</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;

            background: linear-gradient(47deg, #41ccbfd9, #fff, #f5f5f5);
        }

        .container-imc {
            width: 100%;
            max-width: 400px;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        .resultado {
            margin-top: 20px;
            text-align: center;
            font-weight: bold;
        }
    </style>
</head>

<body>

<div class="container-imc">

    <h2>Calcular IMC</h2>

    <label>Peso (kg)</label>
    <input type="number" id="peso" class="form-control" placeholder="Ex: 70">

    <label class="mt-3">Altura (m)</label>
    <input type="number" step="0.01" id="altura" class="form-control" placeholder="Ex: 1.75">

    <button class="btn btn-success w-100 mt-4" onclick="calcularIMC()">Calcular</button>

    <div id="resultado" class="resultado"></div>

</div>

<script>
function calcularIMC() {
    let peso = parseFloat(document.getElementById("peso").value);
    let altura = parseFloat(document.getElementById("altura").value);

    if (!peso || !altura) {
        alert("Preencha todos os campos!");
        return;
    }

    let imc = peso / (altura * altura);
    imc = imc.toFixed(2);

    let classificacao = "";

    if (imc < 18.5) classificacao = "Abaixo do peso";
    else if (imc < 25) classificacao = "Peso normal";
    else if (imc < 30) classificacao = "Sobrepeso";
    else if (imc < 35) classificacao = "Obesidade grau I";
    else if (imc < 40) classificacao = "Obesidade grau II";
    else classificacao = "Obesidade grau III";

    document.getElementById("resultado").innerHTML =
        `Seu IMC é ${imc} <br>
     <strong>${classificacao}</strong><br><br>
     Contate um dos nossos profissionais e obtenha sua dieta e treino personalizados`;
}
</script>

</body>
</html>
